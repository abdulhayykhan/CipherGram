name: CipherGram Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build and Deploy Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Reconstruct Android Keystore
        run: |
          echo "Decoding keystore and storing it in a temporary local workspace cache path"
          mkdir -p .signing
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > .signing/my-upload-key.jks
          if [ -s .signing/my-upload-key.jks ]; then
            echo "Keystore successfully reconstructed and cached locally."
          else
            echo "Error Reconstructing Keystore."
            exit 1
          fi

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Compile and Assemble Release APK
        env:
          KEYSTORE_PATH: .signing/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign Android Binary (Alignment & Verification)
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Stage Verified Release Asset
        run: |
          cp ${{ steps.sign_app.outputs.signedReleaseFile }} CipherGram.apk
          echo "Release APK staged successfully."

      - name: Create GitHub Release and Deploy Assets
        uses: softprops/action-gh-release@v2
        with:
          files: CipherGram.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
